name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Build static + shared library
        run: make
      - name: Run test suite
        run: make test
      - name: Verify install target (DESTDIR sandbox)
        run: |
          make install DESTDIR="$PWD/_stage" PREFIX=/usr/local
          ls -R _stage
          test -f _stage/usr/local/lib/libsparcli.a
          test -f _stage/usr/local/lib/pkgconfig/sparcli.pc
          test -f _stage/usr/local/include/sparcli.h

  sanitize:
    name: ASAN + UBSAN (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite under sanitizers
        run: make sanitize
